<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9AM Wealth Creation | Financial Education & Analytical Frameworks</title>
    
    <meta name="description" content="At 9AM Wealth Creation, we bridge the gap between financial theory and market execution with deep technical understanding and investment analysis frameworks.">
    <meta name="keywords" content="9AM Wealth Creation, financial theory, market execution, investment strategy, technical analysis, portfolio management">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://9amwealthcreation.com/">

    <!-- Tailwind CSS Core -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: 'var(--color-primary)',
                            hover: 'var(--color-primary-hover)',
                            active: 'var(--color-primary-active)',
                            focus: 'var(--color-primary-focus)',
                        },
                        secondary: {
                            DEFAULT: 'var(--color-secondary)',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Icons & Typography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           COLOR CONFIGURATION MATRIX (GREEN THEME)
           ========================================== */
        :root {
            /* Light Mode Theme Parameters - Emerald/Green */
            --color-primary: #16a34a;         /* Emerald-600 */
            --color-primary-hover: #15803d;   /* Emerald-700 */
            --color-primary-active: #166534;  /* Emerald-800 */
            --color-primary-focus: #dcfce7;   /* Emerald-100 */
            
            --color-secondary: #16a34a;       /* Branding Secondary Green */
        }

        .dark {
            /* Dark Mode Theme Parameters - Emerald/Green */
            --color-primary: #22c55e;         /* Emerald-500 */
            --color-primary-hover: #16a34a;   /* Emerald-600 */
            --color-primary-active: #15803d;  /* Emerald-700 */
            --color-primary-focus: #052e16;   /* Emerald-950 */
            
            --color-secondary: #22c55e;       /* Dark Mode Secondary Green */
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary selection:text-white transition-colors duration-300 overflow-x-hidden">

    <!-- Section 1: Navigation Bar -->
    <header class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200/80 dark:border-slate-800/80 sticky top-0 z-40 transition-colors duration-300">
        <div class="w-full px-6 sm:px-12 h-24 flex items-center justify-between">
            <a href="homepage.html" class="flex flex-col tracking-tight group">
                <span class="text-2xl sm:text-3xl font-black text-slate-950 dark:text-white group-hover:text-primary transition-colors duration-200">
                    9AM WEALTH <span class="text-secondary">CREATION</span>
                </span>
            </a>
            
            <div class="flex items-center">
                <nav class="flex items-center gap-4 sm:gap-5" aria-label="Social Navigation Menu">
                    <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" 
                       class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-red-600 dark:hover:text-red-500 text-xl sm:text-2xl transition-all duration-200 hover:scale-110" 
                       aria-label="Visit 9AM Wealth Creation on YouTube">
                        <i class="fab fa-youtube" aria-hidden="true"></i>
                    </a>
                    <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" 
                       class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 text-xl sm:text-2xl transition-all duration-200 hover:scale-110" 
                       aria-label="Connect with 9AM Wealth Creation on Facebook">
                        <i class="fab fa-facebook-f" aria-hidden="true"></i>
                    </a>
                    
                    <div class="h-5 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
                    
                    <!-- Sidebar Open Button (...) -->
                    <button id="sidebarToggle" 
                            class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-400 hover:text-primary text-xl sm:text-2xl transition-all duration-200 hover:scale-110 outline-none"
                            title="Open Settings Sidebar" aria-label="Open settings and theme options layout drawer">
                        <i class="fas fa-ellipsis-h" aria-hidden="true"></i>
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Standard Settings Sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <aside id="sidebarDrawer" class="fixed top-0 right-0 h-full w-80 max-w-[calc(100vw-2rem)] bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 z-50 translate-x-full transition-transform duration-300 ease-in-out shadow-2xl flex flex-col p-6">
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-200 dark:border-slate-800">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-800 dark:text-slate-200">Settings</h2>
            <button id="sidebarClose" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-lg transition-colors duration-150 p-1" aria-label="Close Sidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="space-y-6 flex-grow">
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider block">Theme Mode</label>
                <button id="themeToggle" 
                        class="w-full flex items-center justify-between gap-3 bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/80 p-3 rounded-xl transition-all duration-200 outline-none font-medium text-sm shadow-sm">
                    <span class="flex items-center gap-2.5">
                        <i id="themeToggleIcon" class="fas fa-moon text-slate-400 dark:text-emerald-400"></i>
                        Interface Style
                    </span>
                    <span id="themeLabel" class="text-xs font-bold text-slate-400 dark:text-slate-500 font-mono tracking-tight uppercase">Light</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Section 2: Main Search Layout Area -->
    <main class="flex-grow flex items-center justify-center bg-white dark:bg-slate-950 px-6 py-20 relative overflow-hidden transition-colors duration-300">
        <div class="w-full max-w-3xl mx-auto text-center space-y-6">
            <form id="searchForm" class="relative w-full">
                <div class="relative flex items-center">
                    <i class="fas fa-search absolute left-6 text-slate-400 dark:text-slate-500 text-xl pointer-events-none"></i>
                    <input type="text" 
                           id="searchInput" 
                           placeholder="Search frameworks, market insights, topics..." 
                           class="w-full pl-16 pr-32 py-5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 text-lg font-medium shadow-lg focus:outline-none focus:ring-4 focus:ring-primary-focus focus:border-primary transition-all duration-200">
                    <button type="submit" 
                            class="absolute right-3 bg-primary hover:bg-primary-hover active:bg-primary-active text-white font-bold text-sm px-6 py-3 rounded-xl transition-all duration-200 shadow-md">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Section 3: Footer Landmark Architecture -->
    <footer class="bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-900 py-8 text-center text-xs text-slate-500 font-medium tracking-wide transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6">
            &copy; 2026 9AM Wealth Creation. All rights reserved. Registered Educational Interface.
        </div>
    </footer>

    <!-- Scripts Module -->
    <script>
        // --- Sidebar Logic Handler ---
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarClose = document.getElementById('sidebarClose');
        const sidebarDrawer = document.getElementById('sidebarDrawer');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleDrawerState(open = true) {
            if (open) {
                sidebarDrawer.classList.remove('translate-x-full');
                sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none');
                document.body.classList.add('overflow-hidden');
            } else {
                sidebarDrawer.classList.add('translate-x-full');
                sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
                document.body.classList.remove('overflow-hidden');
            }
        }

        sidebarToggle.addEventListener('click', () => toggleDrawerState(true));
        sidebarClose.addEventListener('click', () => toggleDrawerState(false));
        sidebarOverlay.addEventListener('click', () => toggleDrawerState(false));

        // --- Core Application Theme Configurations ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeToggleIcon = document.getElementById('themeToggleIcon');
        const themeLabel = document.getElementById('themeLabel');
        
        function updateThemeInterfaceElements() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggleIcon.className = isDark ? 'fas fa-sun text-amber-500' : 'fas fa-moon text-slate-400';
            themeLabel.innerText = isDark ? 'Dark' : 'Light';
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        updateThemeInterfaceElements();

        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateThemeInterfaceElements();
        });

        // --- Search Form Handler ---
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) {
                alert(`Searching for: ${query}`);
            }
        });
    </script>
</body>
</html>
